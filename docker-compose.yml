services:
  backend:
    build:
      context: ./backend
    container_name: china-wall-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=sqlite:///./data/china_wall.db
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:80","http://frontend:80"]
      - WIKIPEDIA_USER_AGENT=ChinaWall/1.0 (educational project)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: china-wall-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: npx vite --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    restart: unless-stopped

